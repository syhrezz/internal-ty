<!DOCTYPE html>
<html lang="id">

<head>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WoodTrack Pro — Master Kaca Ukuran Standard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
        }
    </script>

    <!-- Font Awesome 6.7.2 CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <!-- Shared Global Styles -->
    <link rel="stylesheet" href="../../../_shared/css/main.css">
    <link rel="stylesheet" href="../../../_shared/css/components.css">
    
</head>

<body class="flex h-screen overflow-hidden bg-[#F5F3EF] font-sans">

    <!-- ═══════════════════════════ SIDEBAR ═══════════════════════════ -->
    <div id="sidebar" class="flex-shrink-0 h-full"></div>

    <!-- ═══════════════════════════ MAIN ═══════════════════════════ -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden" data-title="Master Kaca Ukuran Standard" data-subtitle="Master Data · Master Kaca">
        <!-- TOP BAR -->
        <div id="navbar" class="h-16 flex-shrink-0"></div>

        <!-- PAGE CONTENT -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6">

            <!-- Stat Cards Row -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 anim d1">
                <!-- Stat 1 -->
                <div class="hero-stat bg-gradient-to-br from-amber-500 to-amber-600 text-white shadow-md shadow-amber-500/10">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-semibold text-amber-100 uppercase tracking-wider">Total Ukuran Standard</p>
                            <h3 id="stat-total" class="text-2xl font-extrabold mt-1.5">0 ukuran</h3>
                        </div>
                        <div class="hero-icon">
                            <i class="fa-solid fa-circle-check  text-xl"></i>
                        </div>
                    </div>
                </div>

                <!-- Stat 2 -->
                <div class="hero-stat bg-gradient-to-br from-orange-500 to-amber-600 text-white shadow-md shadow-orange-500/10">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-semibold text-orange-100 uppercase tracking-wider">Status Aktif</p>
                            <h3 id="stat-active" class="text-2xl font-extrabold mt-1.5">0 ukuran</h3>
                        </div>
                        <div class="hero-icon">
                            <i class="fa-solid fa-circle-check  text-xl"></i>
                        </div>
                    </div>
                </div>

                <!-- Stat 3 -->
                <div class="hero-stat bg-gradient-to-br from-zinc-800 to-zinc-900 text-white shadow-md shadow-zinc-800/10">
                    <div class="flex items-center justify-between">
                        <div>
                            <p class="text-xs font-semibold text-zinc-300 uppercase tracking-wider">Non-Aktif</p>
                            <h3 id="stat-inactive" class="text-2xl font-extrabold mt-1.5">0 ukuran</h3>
                        </div>
                        <div class="hero-icon bg-zinc-700/50">
                            <i class="fa-solid fa-circle-xmark  text-xl"></i>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Main Data Table Card -->
            <div class="glass-card rounded-2xl shadow-sm p-6 space-y-4 anim d2">
                <!-- Search & Filters Toolbar -->
                <div class="flex flex-col md:flex-row items-start md:items-center justify-between gap-4">
                    <div class="flex flex-wrap items-center gap-3 w-full md:w-auto">
                        <select id="status-filter" onchange="handleStatusFilter(this.value)" class="premium-select w-full sm:w-[150px]">
                            <option value="All">Semua Status</option>
                            <option value="Aktif">Aktif</option>
                            <option value="Non-Aktif">Non-Aktif</option>
                        </select>
                    </div>

                    <div class="flex items-center gap-3 w-full md:w-auto justify-between md:justify-end">
                        <div class="relative w-full sm:w-auto">
                            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-zinc-400 text-xs"></i>
                            <input type="text" id="table-search" oninput="handleSearch(this.value)" placeholder="Cari kode, ukuran..." class="search-input w-full sm:w-[240px]">
                        </div>
                        <button onclick="openAddModal()" class="px-4 py-2 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-600 hover:to-amber-700 active:scale-[0.98] text-white font-semibold text-xs rounded-xl shadow-md shadow-amber-500/10 flex items-center gap-2 transition-all">
                            <i class="fa-solid fa-plus  text-[13px]"></i>
                            Tambah Data
                        </button>
                    </div>
                </div>

                <!-- Table Container -->
                <div class="overflow-x-auto border border-zinc-100 rounded-xl bg-white">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-zinc-50 border-b border-zinc-100">
                                <th class="py-3 px-4 text-[11px] font-bold text-zinc-400 uppercase tracking-wider w-12 text-center">No</th>
                                <th class="py-3 px-4 text-[11px] font-bold text-zinc-400 uppercase tracking-wider">Kode</th>
                                <th class="py-3 px-4 text-[11px] font-bold text-zinc-400 uppercase tracking-wider">Ukuran Standard</th>
                                <th class="py-3 px-4 text-[11px] font-bold text-zinc-400 uppercase tracking-wider">Keterangan</th>
                                <th class="py-3 px-4 text-[11px] font-bold text-zinc-400 uppercase tracking-wider text-center">Status</th>
                                <th class="py-3 px-4 text-[11px] font-bold text-zinc-400 uppercase tracking-wider text-center w-24">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="divide-y divide-zinc-50 text-[13px] text-zinc-700">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                    
                    <!-- Table Empty State -->
                    <div id="table-empty" class="hidden py-12 text-center">
                        <div class="w-12 h-12 rounded-full bg-zinc-100 flex items-center justify-center mx-auto mb-3">
                            <i class="fa-solid fa-folder-open text-lg text-zinc-400"></i>
                        </div>
                        <h4 class="font-bold text-zinc-800 text-[14px]">Data Kosong</h4>
                        <p class="text-zinc-400 text-xs mt-1">Belum ada ukuran standard terdaftar.</p>
                    </div>
                </div>

                <!-- Table Footer Pagination -->
                <div class="flex items-center justify-between pt-2">
                    <p id="table-pagination-info" class="text-xs text-zinc-400">Menampilkan 0-0 dari 0 entries</p>
                    <div class="flex gap-2">
                        <button onclick="prevPage()" id="btn-prev" class="p-2 border border-zinc-200 rounded-lg hover:bg-zinc-50 disabled:opacity-40 disabled:hover:bg-transparent transition-all">
                            <i class="fa-solid fa-chevron-left text-zinc-600 text-xs"></i>
                        </button>
                        <button onclick="nextPage()" id="btn-next" class="p-2 border border-zinc-200 rounded-lg hover:bg-zinc-50 disabled:opacity-40 disabled:hover:bg-transparent transition-all">
                            <i class="fa-solid fa-chevron-right text-zinc-600 text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- ═══════════════════════════ FORM MODAL ═══════════════════════════ -->
    <div id="form-modal" class="modal-container">
        <div class="modal-backdrop" onclick="closeModal()"></div>
        <div class="modal-content">
            <div class="flex items-center justify-between border-b border-zinc-100 pb-3 mb-4">
                <h3 id="modal-title" class="font-extrabold text-zinc-900 text-base">Tambah Ukuran Standard</h3>
                <button onclick="closeModal()" class="text-zinc-400 hover:text-zinc-600 transition-colors">
                    <i class="fa-solid fa-xmark  text-sm"></i>
                </button>
            </div>
            
            <form id="data-form" onsubmit="handleSubmit(event)" class="space-y-4 text-xs">
                <input type="hidden" id="edit-id">
                
                <div>
                    <label class="block text-zinc-500 font-bold mb-1">Kode Ukuran *</label>
                    <input type="text" id="form-code" placeholder="Contoh: SZ-122-244, SZ-183-244" required class="w-full px-3 py-2 border border-zinc-200 rounded-lg text-zinc-800 outline-none focus:border-amber-500">
                </div>

                <div>
                    <label class="block text-zinc-500 font-bold mb-1">Ukuran Standard *</label>
                    <input type="text" id="form-size" placeholder="Contoh: 122x244 cm" required class="w-full px-3 py-2 border border-zinc-200 rounded-lg text-zinc-800 outline-none focus:border-amber-500">
                </div>

                <div>
                    <label class="block text-zinc-500 font-bold mb-1">Status *</label>
                    <select id="form-status" required class="w-full px-3 py-2 border border-zinc-200 rounded-lg text-zinc-800 outline-none focus:border-amber-500">
                        <option value="Aktif">Aktif</option>
                        <option value="Non-Aktif">Non-Aktif</option>
                    </select>
                </div>

                <div>
                    <label class="block text-zinc-500 font-bold mb-1">Keterangan</label>
                    <textarea id="form-desc" placeholder="Keterangan tambahan..." rows="2" class="w-full px-3 py-2 border border-zinc-200 rounded-lg text-zinc-800 outline-none focus:border-amber-500"></textarea>
                </div>

                <div class="flex items-center justify-end gap-2 pt-2 border-t border-zinc-100">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-zinc-200 rounded-lg text-zinc-500 hover:bg-zinc-50 font-bold">Batal</button>
                    <button type="submit" class="px-5 py-2 bg-zinc-800 hover:bg-zinc-900 active:scale-[0.98] text-white font-bold rounded-lg transition-all">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../../../_shared/js/crud-helper.js"></script>
    <script src="master-kaca-ukuran.js"></script>

    <!-- Global Shared Logic -->
    <script src="../../../_shared/js/main.js"></script>
    <script src="../../../_shared/js/utils.js"></script>
</body>

</html>
